<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Lynn Hoa Studio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet" />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#f7f5f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="LH Studio" />

    <style>
      /* Base reset. The fixed full-screen no-scroll behavior for the installed
         iOS PWA is anchored here; on desktop the body simply scrolls normally
         because the Shell uses min-height instead of a fixed height. */
      * { -webkit-tap-highlight-color: transparent; }
      html, body, #root {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      body {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
        background: #faf9f7;
        overscroll-behavior: none;
      }
      /* When launched as a standalone iOS app, lock the page: no rubber-band
         scroll, no bounce. Individual screens scroll their own content or open
         modals instead. */
      @media all and (display-mode: standalone) {
        html, body {
          position: fixed;
          width: 100%;
          height: 100%;
          overflow: hidden;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
